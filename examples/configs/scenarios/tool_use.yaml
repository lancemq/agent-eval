# Tool Use Scenarios
scenarios:
  - task_id: "web_search_1"
    goal: "Find the current temperature in San Francisco"
    available_tools: ["web_search", "weather_api"]
    initial_state: {}
    success_criteria:
      must_call: ["weather_api"]
      max_turns: 3

  - task_id: "file_ops_1"
    goal: "Create a file 'test.txt' with content 'Hello World' and read it back"
    available_tools: ["file_write", "file_read"]
    initial_state: {}
    success_criteria:
      must_call: ["file_write", "file_read"]
      max_turns: 4

  - task_id: "calculation_1"
    goal: "Calculate (15 * 23) + (42 / 6) using the calculator tool"
    available_tools: ["calculator"]
    initial_state: {}
    success_criteria:
      must_call: ["calculator"]
      expected_result: 352.0
      max_turns: 3

  - task_id: "multi_tool_1"
    goal: "Search for 'Python lambda function', save the result to 'lambda.txt', then read it back"
    available_tools: ["web_search", "file_write", "file_read"]
    initial_state: {}
    success_criteria:
      must_call: ["web_search", "file_write", "file_read"]
      max_turns: 5