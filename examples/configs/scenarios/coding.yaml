# Coding Task Scenarios
tasks:
  - task_id: "lcs_generation"
    type: "generation"
    prompt: "Write a Python function called `longest_common_subsequence(s1, s2)` that finds the longest common subsequence of two strings."
    test_cases:
      - input: ["ABCDGH", "AEDFHR"]
        expected: "ADH"
      - input: ["AGGTAB", "GXTXAYB"]
        expected: "GTAB"
    criteria:
      correctness: 0.6
      efficiency: 0.2
      style: 0.2

  - task_id: "fix_max_bug"
    type: "debugging"
    prompt: "Fix the bug in this code:\n\n```python\ndef find_max(nums):\n    max_val = 0\n    for n in nums:\n        if n > max_val:\n            max_val = n\n    return max_val\n```"
    test_cases:
      - input: [[1, 5, 3, 9, 2]]
        expected: 9
      - input: [[-5, -1, -3]]
        expected: -1
      - input: [[]]
        expected: null
    criteria:
      correctness: 0.7
      explanation: 0.3

  - task_id: "refactor_process_items"
    type: "refactoring"
    prompt: "Refactor this code to be more Pythonic and efficient:\n\n```python\ndef process_items(items):\n    result = []\n    for i in range(len(items)):\n        if items[i] % 2 == 0:\n            result.append(items[i] * 2)\n    return result\n```"
    test_cases:
      - input: [[1, 2, 3, 4, 5]]
        expected: [4, 8]
      - input: [[]]
        expected: []
    criteria:
      correctness: 0.4
      style: 0.4
      efficiency: 0.2

  - task_id: "fibonacci_generation"
    type: "generation"
    prompt: "Write a Python function `fibonacci(n)` that returns the nth Fibonacci number using dynamic programming."
    test_cases:
      - input: [1]
        expected: 1
      - input: [10]
        expected: 55
      - input: [20]
        expected: 6765
    criteria:
      correctness: 0.6
      efficiency: 0.3
      style: 0.1